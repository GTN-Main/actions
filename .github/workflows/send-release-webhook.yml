name: Notify about release

on:
  workflow_call:
    inputs:
      releaseTag:
        description: "The tag of the release"
        required: false
        type: string
        default: "latest"
      releaseUrl:
        description: "The url to the release"
        required: false
        type: string
        default: "${{ github.server_url }}/${{ github.repository }}/releases/${{ inputs.releaseTag }}"
      webhookTitle:
        description: "The title to use in the Discord webhook embed"
        required: false
        type: string
        default: "New release of the game!"
      webhookMessage:
        description: "The message to send to the Discord webhook"
        required: false
        type: string
        default: "A new release of the game is available! You can download it [here](${{ inputs.releaseUrl }}). Version `${{ inputs.releaseTag }}`."

jobs:
  notifyAboutRelease:
    name: Send discord webhook if release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Send discord webhook (release only)
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          embed-title: ${{ inputs.webhookTitle }}
          embed-url: ${{ inputs.releaseUrl }}
          embed-description: ${{ inputs.webhookMessage }}
          embed-color: 1103120
          embed-thumbnail-url: https://static.wikia.nocookie.net/nicos-nextbots/images/0/02/Chilly_high_res.png
