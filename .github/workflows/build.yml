name: Build for provided platform

on:
  workflow_call:
    inputs:
      targetPlatform:
        description: "The target platform to build for"
        required: true
        type: string
        default: "StandaloneWindows64"
      webhookTitle:
        description: "The title to use in the Discord webhook embed (only for nightly builds)"
        required: false
        type: string
        default: "New nightly build available!"
      webhookMessage:
        description: "The message to send to the Discord webhook (only for nightly builds)"
        required: false
        type: string
        default: "A new nightly build of ${{ github.repository }} is available!"
      webhookThumbnailUrl:
        description: "The thumbnail URL to use in the Discord webhook embed (only for nightly builds)"
        required: false
        type: string
        default: "https://static.wikia.nocookie.net/nicos-nextbots/images/0/02/Chilly_high_res.png"

jobs:
  build:
    name: ${{ inputs.targetPlatform }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          lfs: true
          clean: false
      - name: Restore library from cache
        run: |
          CACHE_FILE="/root/unity-cache/${{ github.repository_id }}/Library-${{ inputs.targetPlatform }}.tar.zst"
          if [ -f "$CACHE_FILE" ]; then
            tar -I zstd -xf "$CACHE_FILE"
          fi
      - name: Check if build profile exists
        id: check_profile
        run: |
          PROFILE_PATH="Assets/Settings/Build Profiles/${{ inputs.targetPlatform }}.asset"
          if [ -f "$PROFILE_PATH" ]; then
            echo "has_profile=true" >> $GITHUB_OUTPUT
            echo "profile_path=$PROFILE_PATH" >> $GITHUB_OUTPUT
          else
            echo "has_profile=false" >> $GITHUB_OUTPUT
            echo "profile_path=" >> $GITHUB_OUTPUT
          fi
      - name: Debug info
        if: ${{ always() }}
        run: |
          echo "Is build profile detected?: ${{ steps.check_profile.outputs.has_profile }}"
          echo "Profile path: ${{ steps.check_profile.outputs.profile_path || 'None' }}"
      - name: Build project
        uses: game-ci/unity-builder@1d4ee0697f193f54668e98961d79907911f4b4f2
        id: unity-builder
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ inputs.targetPlatform }}
          versioning: Tag
          buildProfile: ${{ steps.check_profile.outputs.has_profile == 'true' && steps.check_profile.outputs.profile_path || null }}
      - name: Save library to cache
        if: always()
        run: |
          CACHE_DIR="/root/unity-cache/${{ github.repository_id }}"
          CACHE_FILE="$CACHE_DIR/Library-${{ inputs.targetPlatform }}.tar.zst"
          if [ -d "Library" ]; then
            mkdir -p "$CACHE_DIR"
            tar -I 'zstd -T0 -8' -cf "$CACHE_FILE" Library/
          fi

      # nightly

      - if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        name: Publish artifact if nightly
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        id: upload-artifact
        with:
          name: Build-${{ inputs.targetPlatform }}-nightly
          path: build/${{ inputs.targetPlatform }}
          compression-level: 9
          overwrite: true
      - name: Check webhook secret
        id: check_webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            echo "has_webhook=true" >> $GITHUB_OUTPUT
          else
            echo "has_webhook=false" >> $GITHUB_OUTPUT
          fi
      - name: Replace placeholders with content
        id: format_webhook
        env:
          RAW_DESCRIPTION: ${{ inputs.webhookMessage }}
          ARTIFACT_URL: ${{ steps.upload-artifact.outputs.artifact-url }}
          TARGET_PLATFORM: ${{ inputs.targetPlatform }}
        run: |
          FORMATTED_DESCRIPTION="${RAW_DESCRIPTION//\$\{ARTIFACT_URL\}/$ARTIFACT_URL}"
          FORMATTED_DESCRIPTION="${FORMATTED_DESCRIPTION//\$\{TARGET_PLATFORM\}/$TARGET_PLATFORM}"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "final_description<<$EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FORMATTED_DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.check_webhook.outputs.has_webhook == 'true' }}
        name: Send discord webhook if nightly
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          embed-title: ${{ inputs.webhookTitle }}
          embed-url: ${{ steps.upload-artifact.outputs.artifact-url }}
          embed-description: ${{ steps.format_webhook.outputs.final_description }}
          embed-color: 1103120
          embed-thumbnail-url: ${{ inputs.webhookThumbnailUrl }}

      # release

      - if: ${{ startsWith(github.ref, 'refs/tags/') }}
        name: Zip build if release
        uses: vimtor/action-zip@5407800dfb2b1b37d48df912330cb22f4ab6f422
        with:
          files: build/${{ inputs.targetPlatform }}
          dest: Build-${{ inputs.targetPlatform }}.zip
      - if: ${{ startsWith(github.ref, 'refs/tags/') }}
        name: Publish release if release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        id: gh-release
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            Build-${{ inputs.targetPlatform }}.zip
